<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stagiaires Legal — Matera</title>
<style>
:root{
  --brand:#4E49FC;--brand-bg:#F5F5FF;--brand-bd:#8784FD;
  --text:#26262C;--sub:#656576;--dis:#A2A1AF;
  --border:#E8E8EC;--bg:#F7F7F8;--white:#FFFFFF;
  --s-bg:#EFFBF2;--s:#13762C;
  --w-bg:#FFF7EB;--w:#955804;
  --e-bg:#FFF5F5;--e:#CA1E12;
  --i-bg:#F2F9FD;--i:#206E92;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.hdr{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.logo{font-weight:700;font-size:16px;color:var(--brand)}
.vsep{width:1px;height:18px;background:var(--border);margin:0 10px}
.hdr-title{font-size:13px;color:var(--sub)}

.nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 24px}
.nt{padding:10px 14px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.nt:hover{color:var(--text)}
.nt.on{color:var(--brand);border-bottom-color:var(--brand)}

.page{display:none;padding:24px;max-width:1100px;margin:0 auto}
.page.on{display:block}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:background .12s}
.btn:hover{background:var(--bg)}
.btn.p{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.p:hover{background:#3f3bd8}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.danger{color:var(--e);border-color:#DB3024}
.btn.danger:hover{background:var(--e-bg)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--sub)}
.btn.ghost:hover{background:var(--bg)}

.bdg{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}

.fg{margin-bottom:12px}
.fl{display:block;font-size:13px;font-weight:500;margin-bottom:4px}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--white)}
.fi:focus{outline:none;border-color:var(--brand-bd)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fchk{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
.fchk input{accent-color:var(--brand);width:15px;height:15px}

.ov{display:none;position:fixed;inset:0;background:rgba(38,38,44,.4);z-index:200;align-items:center;justify-content:center}
.ov.on{display:flex}
.modal{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-height:90vh;overflow-y:auto}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:15px;font-weight:700}
.mft{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;z-index:300;pointer-events:none}
.toast.on{opacity:1}

/* ── BESOINS ── */
.ebar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;flex-wrap:wrap;gap:0}
.ei{display:flex;flex-direction:column;gap:3px;padding:0 20px}
.ei:first-child{padding-left:0}
.el{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.ev{font-size:22px;font-weight:700;line-height:1.1}
.esep{width:1px;height:32px;background:var(--border)}
.nlist{display:flex;flex-direction:column;gap:8px}
.ncard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:15px 18px;display:flex;align-items:flex-start;gap:12px}
.ncard.urgent{border-left:3px solid var(--e)}
.ncard.soon{border-left:3px solid #EF9F27}
.ncard.ok{border-left:3px solid var(--brand)}
.ncard.done{border-left:3px solid var(--s);opacity:.8}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ndot.urgent{background:var(--e)}
.ndot.soon{background:#EF9F27}
.ndot.ok{background:var(--brand)}
.ndot.done{background:var(--s)}
.nbody{flex:1;min-width:0}
.ntop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.nposte{font-size:14px;font-weight:500}
.nctx{font-size:12px;color:var(--sub);margin-top:1px}
.nchips{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.ndates{display:flex;gap:24px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.ndb{display:flex;flex-direction:column;gap:2px}
.ndl{font-size:11px;color:var(--sub)}
.ndv{font-size:13px;font-weight:500}
.ndv.urgent{color:var(--e)}
.ndv.soon{color:var(--w)}
.nact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.empty-ok{background:var(--s-bg);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--s);display:flex;align-items:center;gap:10px}

/* ── PLANNING TABLEAU ── */
.pl-container{overflow-x:auto}
.pl-table{border-collapse:collapse;min-width:100%;font-size:12px}
.pl-table th,.pl-table td{border:1px solid var(--border)}
/* colonne poste */
.pl-table .c-poste{min-width:160px;max-width:160px;width:160px;padding:0;white-space:nowrap;background:var(--white);position:sticky;left:0;z-index:2}
.pl-table .c-poste-inner{padding:8px 12px;display:flex;flex-direction:column;gap:2px}
/* colonnes mois */
.pl-table .c-mo{width:64px;min-width:64px;max-width:64px;padding:0;text-align:center;vertical-align:top}
/* header row */
.pl-table .hd-year{background:var(--bg);font-weight:700;font-size:12px;color:var(--text);padding:8px 12px;text-align:left;position:sticky;left:0;z-index:3}
.pl-table .hd-mo{background:var(--bg);font-weight:500;font-size:11px;color:var(--sub);padding:6px 4px;text-align:center;border-top:2px solid var(--border)}
.pl-table .hd-mo.cur{background:var(--brand-bg);color:var(--brand);font-weight:600}
.pl-table .hd-mo.past{color:var(--dis)}
/* séparateur groupe */
.pl-table .tr-group{background:#F0F0FF}
.pl-table .tr-group td{padding:5px 12px;font-size:11px;font-weight:700;color:var(--brand);border-top:2px solid #D0CFFE}
/* cellule contenu */
.cell-inner{padding:4px 3px;min-height:44px;display:flex;flex-direction:column;gap:3px}
.cell-inner.past-cell{opacity:.5}
/* chips dans cellule */
.chip{border-radius:4px;font-size:11px;font-weight:500;padding:3px 7px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.chip-stage{background:#EEF;color:#3C3489;border-left:3px solid var(--brand)}
.chip-alt{background:#E6F1FB;color:#0C447C;border-left:3px solid #185FA5}
.chip-car{background:var(--w-bg);color:var(--w);border-left:3px solid #EF9F27}
.chip-vacant{background:var(--bg);color:var(--dis);border:1px dashed var(--border)}
.chip-rec-urg{background:var(--e-bg);color:var(--e);border-left:3px solid var(--e)}
.chip-rec-soon{background:var(--w-bg);color:var(--w);border-left:3px solid #EF9F27}
.chip-rec-ok{background:var(--brand-bg);color:var(--brand);border-left:3px solid var(--brand)}
.chip-rec-launched{background:var(--s-bg);color:var(--s);border-left:3px solid var(--s)}
.chip-today{background:var(--brand);color:#fff;border-radius:3px;font-size:9px;padding:1px 4px;align-self:flex-start}
/* poste cell */
.poste-lbl{font-size:12px;font-weight:600;color:var(--text)}
.poste-slot{font-size:11px;color:var(--sub)}
/* légende */
.pl-leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.pl-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.pl-dot{display:inline-block;width:3px;height:14px;border-radius:2px;flex-shrink:0}

/* ── EQUIPE ── */
.tposte{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.tphd{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px}
.tpcount{font-size:12px;color:var(--sub);margin-left:auto}
.tpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr))}
.mcard{padding:14px 15px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.mcard:last-child{border-right:none}
.mchd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px}
.mrow{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.mlbl{font-size:12px;color:var(--sub);min-width:78px;flex-shrink:0}
.mval{font-size:13px;font-weight:500}
.mcbar{height:4px;border-radius:2px;background:var(--border);margin:5px 0 2px;overflow:hidden}
.mcfill{height:100%;border-radius:2px;background:#EF9F27}
.mcinfo{font-size:11px;color:var(--w)}
.mnext{margin-top:7px;padding:6px 10px;background:var(--brand-bg);border-radius:7px;font-size:12px;color:#534AB7;display:flex;justify-content:space-between}
.malert{padding:6px 10px;border-radius:6px;font-size:12px;margin-top:6px}
.malert.e{background:var(--e-bg);color:var(--e)}
.malert.w{background:var(--w-bg);color:var(--w)}
.malert.i{background:var(--i-bg);color:var(--i)}
.mact{display:flex;gap:5px;margin-top:9px}
.mvacant{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75px;color:var(--dis);font-size:12px;gap:5px;cursor:pointer;transition:background .12s;padding:14px 15px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.mvacant:hover{background:var(--brand-bg);color:var(--brand)}

/* ── PARAMÈTRES ── */
.cfg{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px}
.cfg-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cfg-name{font-size:14px;font-weight:500}
.cfg-quota-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.cfg-lbl{font-size:13px;color:var(--sub);min-width:200px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stepper button:hover{background:var(--bg)}
.stepper span{font-size:15px;font-weight:600;min-width:20px;text-align:center}
.cfg-info{font-size:12px;color:var(--sub);margin-top:4px}

@media print{.hdr,.nav,.btn,.mact,.nact,.ov{display:none!important}.page{display:block!important;padding:12px;max-width:100%}.page:not(.on){display:none!important}}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <span class="logo">Matera</span>
    <div class="vsep"></div>
    <span class="hdr-title">Stagiaires — Équipe Legal</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn sm" onclick="window.print()">Exporter PDF</button>
    <button class="btn sm p" onclick="openAdd()">+ Ajouter un stagiaire</button>
  </div>
</div>

<nav class="nav">
  <div class="nt on" onclick="go('besoins')">Besoins de recrutement</div>
  <div class="nt" onclick="go('planning')">Planning</div>
  <div class="nt" onclick="go('equipe')">Équipe en place</div>
  <div class="nt" onclick="go('params')">Paramètres</div>
</nav>

<div id="p-besoins" class="page on"></div>
<div id="p-planning" class="page"></div>
<div id="p-equipe" class="page"></div>
<div id="p-params" class="page"></div>

<!-- MODAL STAGIAIRE -->
<div class="ov" id="modal-s">
  <div class="modal">
    <div class="mhd"><span class="mt" id="ms-t">Ajouter un stagiaire</span><button class="btn ghost sm" onclick="cm('modal-s')">✕</button></div>
    <div class="fg"><label class="fl">Nom complet</label><input class="fi" id="f-nom" type="text" placeholder="Prénom Nom"></div>
    <div class="fg"><label class="fl">Poste</label><select class="fi" id="f-pid"></select></div>
    <div class="frow">
      <div class="fg"><label class="fl">Début</label><input class="fi" id="f-deb" type="date"></div>
      <div class="fg"><label class="fl">Fin</label><input class="fi" id="f-fin" type="date"></div>
    </div>
    <div class="fg"><label class="fchk"><input type="checkbox" id="f-nc"> Aucun délai de carence</label></div>
    <div class="fg" id="f-fcw" style="display:none"><label class="fl">Fin de carence connue</label><input class="fi" id="f-fcm" type="date"></div>
    <div class="mft"><button class="btn" onclick="cm('modal-s')">Annuler</button><button class="btn p" onclick="saveS()">Enregistrer</button></div>
  </div>
</div>

<!-- MODAL POSTE -->
<div class="ov" id="modal-p">
  <div class="modal">
    <div class="mhd"><span class="mt">Ajouter un type de poste</span><button class="btn ghost sm" onclick="cm('modal-p')">✕</button></div>
    <div class="fg"><label class="fl">Nom du poste</label><input class="fi" id="fp-nom" type="text" placeholder="Ex : Stagiaire RH"></div>
    <div class="fg"><label class="fl">Type</label><select class="fi" id="fp-type"><option value="stage">Stage</option><option value="alternance">Alternance</option></select></div>
    <div class="fg"><label class="fl">Nb de postes simultanés autorisés</label><input class="fi" id="fp-quota" type="number" min="1" max="10" value="1"></div>
    <div class="mft"><button class="btn" onclick="cm('modal-p')">Annuler</button><button class="btn p" onclick="savePoste()">Créer</button></div>
  </div>
</div>

<!-- MODAL RECRUTEMENT -->
<div class="ov" id="modal-r">
  <div class="modal">
    <div class="mhd"><span class="mt">Suivi du recrutement</span><button class="btn ghost sm" onclick="cm('modal-r')">✕</button></div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:14px" id="mr-ctx"></div>
    <div class="fg"><label class="fl">Statut</label>
      <select class="fi" id="r-st">
        <option value="sourcing">Sourcing en cours</option>
        <option value="entretiens">Entretiens</option>
        <option value="offre">Offre envoyée</option>
        <option value="signe">Signé ✓</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Candidat (optionnel)</label><input class="fi" id="r-nom" type="text" placeholder="Prénom Nom"></div>
    <div class="fg"><label class="fl">Note</label><input class="fi" id="r-note" type="text" placeholder="Ex : 2 candidats en entretien"></div>
    <div class="mft"><button class="btn" onclick="cm('modal-r')">Annuler</button><button class="btn p" onclick="saveR()">Enregistrer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TODAY = new Date(2026,3,9);
const MO_FR = ['Janv','Févr','Mars','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
const ST_LBL = {sourcing:'Sourcing',entretiens:'Entretiens',offre:'Offre envoyée',signe:'Signé ✓'};

let config = { delai: 120 };

let postes = [
  {id:'jur', label:'Juriste stagiaire',        quota:2, type:'stage'},
  {id:'rcv', label:'Chargé·e de recouvrement', quota:2, type:'stage'},
  {id:'alt', label:'Alternant·e',              quota:1, type:'alternance'},
];

/* Loicka : stage de 6 mois (oct 2025 → 20 mars 2026), carence 2 mois → fin 21 mai 2026
   On la saisit avec sa fin de carence connue car elle est archivée */
function dd(y,m,d){return new Date(y,m-1,d);}

let stags = [
  {id:1, pid:'jur', nom:'Martina', deb:dd(2026,1,8),  fin:dd(2026,6,26),  nc:false, arch:false, fcm:null},
  {id:2, pid:'jur', nom:'Daria',   deb:dd(2026,3,30), fin:dd(2026,9,30),  nc:false, arch:false, fcm:null},
  {id:3, pid:'jur', nom:'Maxime',  deb:dd(2026,7,6),  fin:dd(2027,1,6),   nc:false, arch:false, fcm:null},
  {id:4, pid:'rcv', nom:'Adil',    deb:dd(2026,3,31), fin:dd(2026,9,30),  nc:false, arch:false, fcm:null},
  // Loicka : fin stage 20 mars 2026, carence 2 mois, fin carence 21 mai 2026
  {id:5, pid:'rcv', nom:'Loicka',  deb:dd(2025,10,1), fin:dd(2026,3,20),  nc:false, arch:true,  fcm:dd(2026,5,21)},
  {id:6, pid:'alt', nom:'Lamyae',  deb:null,           fin:dd(2026,9,4),   nc:true,  arch:false, fcm:null},
];

let recs = {};
let uid = 20, posteUid = 10, editSId = null, editRKey = null;

/* ─── UTILS ─── */
function addD(dt,n){const r=new Date(dt);r.setDate(r.getDate()+n);return r;}
function addM(dt,n){
  const r=new Date(dt);
  const targetMonth=r.getMonth()+n;
  r.setDate(1); // avoid overflow
  r.setMonth(targetMonth);
  // Restore original day, capped to last day of target month
  const lastDay=new Date(r.getFullYear(),r.getMonth()+1,0).getDate();
  r.setDate(Math.min(dt.getDate(),lastDay));
  return r;
}
function diff(a,b){return Math.round((b-a)/86400000);}
function fmt(dt){if(!dt)return'—';return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function fmtS(dt){if(!dt)return'—';return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function toI(dt){if(!dt)return'';return[dt.getFullYear(),String(dt.getMonth()+1).padStart(2,'0'),String(dt.getDate()).padStart(2,'0')].join('-');}
function isSameMonth(dt,y,m){return dt.getFullYear()===y&&dt.getMonth()===m;}

/* ─── CALCULS ─── */
// Durée en mois entiers (arrondi INFÉRIEUR, comme la loi : 6 mois et 5 jours = 6 mois)
function moisEntiers(a,b){
  let m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  // Si le jour de fin < jour de début, le dernier mois n'est pas complet
  if(b.getDate()<a.getDate())m=Math.max(0,m-1);
  return m;
}
// Carence en mois = ceil(duréeMois / 3)
function getCarenceMois(s){
  if(s.nc)return 0;
  if(s.fcm&&s.fin)return moisEntiers(s.fin,s.fcm)||1;
  if(!s.deb||!s.fin)return null;
  const dureeM=moisEntiers(s.deb,s.fin);
  if(dureeM<=0)return null;
  return Math.ceil(dureeM/3);
}
function getC(s){return getCarenceMois(s);}
function getFC(s){
  if(s.fcm)return s.fcm;
  if(s.nc)return s.fin;
  if(!s.deb||!s.fin)return null;
  const carM=getCarenceMois(s);
  if(!carM)return s.fin;
  return addM(s.fin,carM);
}
function getSt(s){
  const t=TODAY;
  if(s.arch){const fc=getFC(s);return(fc&&t<=fc)?'carence':'off';}
  if(!s.fin)return'incomplet';
  if(s.deb&&t<s.deb)return'futur';
  if((!s.deb||t>=s.deb)&&t<=s.fin)return'actif';
  const fc=getFC(s);
  if(fc&&t>s.fin&&t<=fc)return'carence';
  return'off';
}
function getAl(s){
  const st=getSt(s);const fc=getFC(s);const dtf=s.fin?diff(TODAY,s.fin):null;
  if(st==='carence'){const r=fc?diff(TODAY,fc):null;return{t:'w',msg:r!==null?`Carence — recrutement dans ${r} j`:'Carence en cours'};}
  if((st==='actif'||st==='futur')&&dtf!==null){
    if(dtf<=30)return{t:'e',msg:`Fin dans ${dtf} j — recruter maintenant`};
    if(dtf<=60)return{t:'w',msg:`Fin dans ${dtf} j — lancer le recrutement`};
    if(dtf<=90)return{t:'i',msg:`Fin dans ${dtf} j`};
  }
  return null;
}

/* ─── BESOINS
   Pour chaque poste, on liste les futures "libérations de slot" :
   - fin de carence d'un stagiaire existant → un slot se libère
   - slot déjà libre aujourd'hui
   On ne génère un besoin QUE si aucun stagiaire planifié ne couvre cette date.
─── */
function computeNeeds(){
  const needs=[];
  const horizon=addM(TODAY,25);

  postes.forEach(p=>{
    // Actifs non archivés avec date de fin
    const actifs=stags.filter(s=>s.pid===p.id&&!s.arch&&s.fin)
      .sort((a,b)=>(a.deb||new Date(0))-(b.deb||new Date(0)));

    // Dates charnières = jours où un slot se libère (fin carence + 1j)
    const checkDates=[];

    // Slot(s) déjà libres aujourd'hui
    const todayCount=actifs.filter(s=>{
      const sd=s.deb||new Date(0);
      return sd<=TODAY&&s.fin>=TODAY;
    }).length;
    // Carence active aujourd'hui
    const carenceCount=stags.filter(s=>{
      if(s.pid!==p.id)return false;
      const fc=getFC(s);
      if(!fc)return false;
      return getSt(s)==='carence';
    }).length;
    if(todayCount+carenceCount<p.quota){
      checkDates.push(TODAY);
    }

    // Fins de carence futures
    [...actifs, ...stags.filter(s=>s.pid===p.id&&s.arch)].forEach(s=>{
      const fc=getFC(s);
      if(!fc)return;
      const free=addD(fc,1);
      if(free>TODAY&&free<=horizon)checkDates.push(free);
    });

    checkDates.sort((a,b)=>a-b).forEach(cd=>{
      if(cd>horizon)return;

      // Effectif présent ce jour
      const here=actifs.filter(s=>{
        const sd=s.deb||new Date(0);
        return sd<=cd&&s.fin>=cd;
      }).length;
      // Arrivants dans les 7j
      const coming=actifs.filter(s=>s.deb&&s.deb>cd&&diff(cd,s.deb)<=7).length;

      if(here+coming<p.quota){
        const dup=needs.some(n=>n.pid===p.id&&Math.abs(diff(n.disponible,cd))<14);
        if(!dup){
          const lancerLe=addD(cd,-config.delai);
          const dL=diff(TODAY,lancerLe);
          const dD=diff(TODAY,cd);
          const urg=dL<0?'urgent':dL<=30?'soon':'ok';
          const sortant=stags.filter(s=>s.pid===p.id&&s.fin&&s.fin<cd)
            .sort((a,b)=>b.fin-a.fin)[0];
          const key=p.id+'-'+cd.getTime();
          needs.push({key,pid:p.id,label:p.label,type:p.type,disponible:cd,lancerLe,dL,dD,urgence:urg,sortantNom:sortant?sortant.nom:null});
        }
      }
    });
  });
  return needs.sort((a,b)=>a.lancerLe-b.lancerLe);
}

document.getElementById('f-nc').addEventListener('change',()=>document.getElementById('f-fcw').style.display='none');
function saveS(){
  const nom=document.getElementById('f-nom').value.trim();
  if(!nom){alert('Nom requis.');return;}
  const pid=document.getElementById('f-pid').value;
  const deb=document.getElementById('f-deb').value;
  const fin=document.getElementById('f-fin').value;
  const nc=document.getElementById('f-nc').checked;
  const fcm=document.getElementById('f-fcm').value;
  if(editSId){
    const s=stags.find(x=>x.id===editSId);
    if(s){s.nom=nom;s.pid=pid;s.deb=deb?new Date(deb):null;s.fin=fin?new Date(fin):null;s.nc=nc;s.fcm=fcm?new Date(fcm):null;s.arch=!deb&&!fin&&!!fcm;}

    stags.push({id:uid++,pid,nom,deb:deb?new Date(deb):null,fin:fin?new Date(fin):null,nc,arch:false,fcm:fcm?new Date(fcm):null});

}

  const car=stags.filter(s=>getSt(s)==='carence').length;
  const total=postes.reduce((a,p)=>a+p.quota,0);
  const urg=needs.filter(n=>n.urgence==='urgent').length;
  const soon=needs.filter(n=>n.urgence==='soon').length;
  let h=`<div class="ebar">
    <div class="ei"><span class="el">Effectif autorisé</span><span class="ev">${total}</span></div>
    <div class="esep"></div>
    <div class="ei"><span class="el">En poste</span><span class="ev" style="color:var(--s)">${actifs}</span></div>
    <div class="esep"></div>
    <div class="ei"><span class="el">En carence</span><span class="ev" style="color:var(--w)">${car}</span></div>
    <div class="esep"></div>
    <div class="ei"><span class="el">À recruter</span><span class="ev" style="color:${urg+soon>0?'var(--e)':'var(--s)'}">${urg+soon}</span></div>

    <div class="ei"><span class="el">Délai d'anticipation</span><span class="ev" style="font-size:16px;font-weight:600">${config.delai} j</span></div>

    h+=`<div class="empty-ok"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Tous les postes sont couverts sur les 24 prochains mois.</div>`;
  } else {
    h+=`<div class="nlist">`;
    needs.forEach(n=>{
      const r=recs[n.key];
      const uc=r?'done':n.urgence;
      const tb=n.type==='alternance'?`<span class="bdg" style="background:#E6F1FB;color:#0C447C">Alternance</span>`:`<span class="bdg" style="background:var(--brand-bg);color:#3C3489">Stage</span>`;
      const uc2=n.urgence==='urgent'?`<span class="bdg" style="background:var(--e-bg);color:var(--e)">À lancer maintenant</span>`:n.urgence==='soon'?`<span class="bdg" style="background:var(--w-bg);color:var(--w)">Dans ${n.dL} j</span>`:`<span class="bdg" style="background:var(--brand-bg);color:#3C3489">Dans ${Math.round(n.dL/30)} mois</span>`;
      let recChip='';
      if(r){const bg=r.status==='signe'?'var(--s-bg)':r.status==='offre'?'var(--i-bg)':'var(--bg)';const co=r.status==='signe'?'var(--s)':r.status==='offre'?'var(--i)':'var(--sub)';recChip=`<span class="bdg" style="background:${bg};color:${co}">${ST_LBL[r.status]}${r.nom?' · '+r.nom:''}</span>`;}
      const lc=n.urgence==='urgent'?'urgent':n.urgence==='soon'?'soon':'';
      const ke=n.key.replace(/'/g,"\\'");const le=n.label.replace(/'/g,"\\'");const ce=(n.sortantNom?'après '+n.sortantNom:'').replace(/'/g,"\\'");
      const recBtn=r?`<button class="btn sm" onclick="openRec('${ke}','${le}','${ce}')">Mettre à jour</button><button class="btn sm danger" onclick="clearR('${ke}')">Retirer</button>`:`<button class="btn sm p" onclick="openRec('${ke}','${le}','${ce}')">Marquer comme lancé</button>`;
      h+=`<div class="ncard ${uc}"><div class="ndot ${uc}"></div><div class="nbody">
        <div class="ntop"><div><div class="nposte">${n.label}</div><div class="nctx">${n.sortantNom?'Successeur de '+n.sortantNom:'Poste non couvert'}</div></div>
        <div class="nchips">${tb}${uc2}${recChip}</div></div>
        <div class="ndates">
          <div class="ndb"><span class="ndl">Lancer le recrutement le</span><span class="ndv ${lc}">${fmt(n.lancerLe)}${n.dL<0?' — dépassé':''}</span></div>
          <div class="ndb"><span class="ndl">Prise de poste</span><span class="ndv">${fmt(n.disponible)}</span></div>
          ${n.dD>0?`<div class="ndb"><span class="ndl">Temps restant</span><span class="ndv">${n.dD} j · ${Math.round(n.dD/30)} mois</span></div>`:''}
          ${r&&r.note?`<div class="ndb"><span class="ndl">Note</span><span class="ndv" style="font-weight:400;color:var(--sub)">${r.note}</span></div>`:''}

    });

  }
  document.getElementById('p-besoins').innerHTML=h;
}

/* ═══ RENDER PLANNING — tableau clair sur 24 mois glissants ═══ */
function renderPlanning(){
  const needs=computeNeeds();
  // 24 mois glissants à partir du mois courant
  const months=[];
  for(let i=0;i<24;i++){
    const d=addM(new Date(TODAY.getFullYear(),TODAY.getMonth(),1),i);
    months.push({y:d.getFullYear(),m:d.getMonth()});
  }

  // Grouper par année pour les en-têtes
  const years=[...new Set(months.map(x=>x.y))];

  let h=`<div class="pl-container"><table class="pl-table" style="border-collapse:collapse">`;

  // ── Lignes d'en-tête ──
  // Ligne années
  h+=`<tr><th class="c-poste" style="background:var(--bg);border:1px solid var(--border);padding:8px 12px;font-size:12px;font-weight:700;color:var(--sub);text-align:left;position:sticky;left:0;z-index:3">Poste</th>`;
  years.forEach(y=>{
    const count=months.filter(x=>x.y===y).length;
    h+=`<th colspan="${count}" style="background:var(--bg);border:1px solid var(--border);padding:6px 12px;font-size:12px;font-weight:700;color:var(--text);text-align:left">${y}</th>`;
  });
  h+=`</tr>`;

  // Ligne mois
  h+=`<tr><th class="c-poste" style="background:var(--bg);border:1px solid var(--border);padding:6px 12px;position:sticky;left:0;z-index:3"></th>`;
  months.forEach(({y,m})=>{
    const isCur=y===TODAY.getFullYear()&&m===TODAY.getMonth();
    const isPast=new Date(y,m+1,0)<TODAY;
    h+=`<th class="c-mo hd-mo${isCur?' cur':isPast?' past':''}" style="border:1px solid var(--border)">${MO_FR[m]}</th>`;
  });
  h+=`</tr>`;

  // ── Lignes par poste ──
  postes.forEach(p=>{
    // Ligne groupe (nom du poste sur toute la largeur)
    const typeColor=p.type==='alternance'?'#0C447C':'#3C3489';
    const typeBg=p.type==='alternance'?'#E6F1FB':'var(--brand-bg)';
    h+=`<tr class="tr-group"><td colspan="${months.length+1}" style="border:1px solid var(--border)">
      ${p.label} <span class="bdg" style="background:${typeBg};color:${typeColor};font-size:10px">${p.type==='alternance'?'Alternance':'Stage'}</span>
      <span style="font-size:11px;font-weight:400;color:var(--sub);margin-left:8px">${p.quota} poste${p.quota>1?'s':''} autorisé${p.quota>1?'s':''}</span>
    </td></tr>`;

    // Stagiaires non archivés triés par début, puis par fin
    const members=stags.filter(s=>s.pid===p.id&&!s.arch&&s.fin)
      .sort((a,b)=>(a.deb||new Date(0))-(b.deb||new Date(0)));

    // ── Attribution fixe des slots ──
    // On remplit les slots comme un planning : on assigne chaque stagiaire
    // au premier slot libre à sa date de début (pas de chevauchement par slot).
    // slotAssign[id] = numéro de slot (0-based)
    const slotAssign={};
    // Pour chaque slot, mémoriser jusqu'à quand il est occupé (fin de carence)
    const slotFreeAt=Array(p.quota).fill(new Date(0));
    members.forEach(s=>{
      const start=s.deb||new Date(0);
      // Trouver le slot disponible le plus tôt avant ou à la date de début
      let bestSlot=0;
      let bestFree=slotFreeAt[0];
      for(let sl=0;sl<p.quota;sl++){
        if(slotFreeAt[sl]<=start){
          // Ce slot est libre à la date de début → l'utiliser
          bestSlot=sl;bestFree=slotFreeAt[sl];
          break;
        }
        // Sinon prendre le slot qui se libère le plus tôt
        if(slotFreeAt[sl]<bestFree){bestSlot=sl;bestFree=slotFreeAt[sl];}
      }
      slotAssign[s.id]=bestSlot;
      const fc=getFC(s)||s.fin;
      if(fc>slotFreeAt[bestSlot])slotFreeAt[bestSlot]=fc;
    });

    // Carence Loicka et autres archivés : on les place aussi dans un slot
    const archived=stags.filter(s=>s.pid===p.id&&s.arch&&getFC(s));
    const archivedSlotAssign={};
    archived.forEach(s=>{
      // Placer dans le slot dont la fin de carence correspond le mieux
      const fc=getFC(s);
      // On essaie de trouver un slot dont slotFreeAt est proche de fc
      let bestSlot=0;
      for(let sl=1;sl<p.quota;sl++){
        if(Math.abs(diff(slotFreeAt[sl],fc))<Math.abs(diff(slotFreeAt[bestSlot],fc)))bestSlot=sl;
      }
      archivedSlotAssign[s.id]=bestSlot;
    });

    // Une ligne par slot
    for(let slot=0;slot<p.quota;slot++){
      // Stagiaires de ce slot
      const slotMembers=members.filter(s=>slotAssign[s.id]===slot);
      const slotArchived=archived.filter(s=>archivedSlotAssign[s.id]===slot);

      h+=`<tr>`;
      h+=`<td class="c-poste" style="border:1px solid var(--border);background:var(--white)"><div class="c-poste-inner"><span class="poste-slot" style="color:var(--sub)">Poste ${slot+1}</span></div></td>`;

      months.forEach(({y,m})=>{
        const mStart=new Date(y,m,1);
        const mEnd=new Date(y,m+1,0);
        const isCur=y===TODAY.getFullYear()&&m===TODAY.getMonth();
        const isPast=mEnd<TODAY;

        // Occupant ce mois sur CE slot
        const occupant=slotMembers.find(s=>{
          const sd=s.deb||new Date(0);
          return sd<=mEnd&&s.fin>=mStart;
        });

        // Carence active ce mois sur ce slot (archivé)
        const carenceSlot=slotArchived.find(s=>{
          const fc=getFC(s);if(!fc)return false;
          const finStag=s.fin||new Date(0);
          return finStag<mStart&&fc>=mStart;
        });

        // Besoin lié à ce slot ce mois
        // On associe le besoin N au slot N (triés par date de disponibilité)
        const needsSorted=needs.filter(n=>n.pid===p.id).sort((a,b)=>a.disponible-b.disponible);
        const needThisMonth=needsSorted[slot]&&needsSorted[slot].lancerLe.getFullYear()===y&&needsSorted[slot].lancerLe.getMonth()===m?needsSorted[slot]:null;

        let chips='';
        const cellClass=isPast?'cell-inner past-cell':'cell-inner';

        if(isCur)chips+=`<span class="chip-today">Aujourd'hui</span>`;

        // Carence active ce mois sur ce slot (occupant fini ou archivé)
        const carenceThisSlot = carenceSlot || slotMembers.find(s=>{
          const fc=getFC(s);
          if(!fc||s.nc)return false;
          return s.fin<mStart&&fc>=mStart;
        });

        // Fond de cellule
        let cellBg=isCur?'#FAFAFF':'var(--white)';
        if(carenceThisSlot&&!occupant)cellBg='#FFFBF0';

        // 1. Occupant présent ce mois
        if(occupant){
          const cls=p.type==='alternance'?'chip-alt':'chip-stage';
          const isFirstM=occupant.deb&&isSameMonth(occupant.deb,y,m);
          const isLastM=isSameMonth(occupant.fin,y,m);
          let label=occupant.nom.split(' ')[0];
          if(isFirstM)label='→ '+label;
          if(isLastM)label=label+' ←';
          const fc=getFC(occupant);
          const cM=getCarenceMois(occupant);
          const lancerLe=fc?addD(fc,-config.delai):null;
          const tip=[
            occupant.nom,
            'Stage : '+fmtS(occupant.deb||null)+' → '+fmt(occupant.fin),
            cM&&cM>0?'Carence : '+cM+' mois (fin '+fmt(fc)+')':occupant.nc?'Sans carence':'',
            lancerLe?'Lancer recrutement : '+fmt(lancerLe):''
          ].filter(Boolean).join('&#10;');
          chips+=`<span class="chip ${cls}" title="${tip}">${label}</span>`;
          if(isLastM&&cM&&cM>0){
            chips+=`<span style="font-size:9px;color:var(--w);display:block;margin-top:1px">⏳ car. ${cM} mois → ${fmt(fc)}</span>`;
          }
        }

        // 2. Carence (slot libre mais bloqué)
        if(!occupant&&carenceThisSlot){
          const fc=getFC(carenceThisSlot);
          const cM=getCarenceMois(carenceThisSlot);
          const endsHere=fc&&isSameMonth(fc,y,m);
          const nom=carenceThisSlot.nom||'';
          chips+=`<span class="chip chip-car" title="Carence de ${nom} · ${cM} mois · fin ${fmt(fc)}">Carence${endsHere?' ←':''}</span>`;
        }

        // 3. Besoin de recrutement — affiché dans le mois où il faut LANCER (= lancerLe)
        // Aussi affiché si le slot sera libre prochainement (prise de poste = disponible)
        if(!occupant&&!carenceThisSlot&&needThisMonth){
          const r=recs[needThisMonth.key];
          cellBg=needThisMonth.urgence==='urgent'?'#FFF5F5':needThisMonth.urgence==='soon'?'#FFFBF0':isCur?'#FAFAFF':'var(--white)';
          if(r){
            chips+=`<span class="chip chip-rec-launched" title="${ST_LBL[r.status]}${r.nom?' · '+r.nom:''}">⚡ ${ST_LBL[r.status]}</span>`;
          } else {
            const nc=needThisMonth.urgence==='urgent'?'chip-rec-urg':needThisMonth.urgence==='soon'?'chip-rec-soon':'chip-rec-ok';
            const urgIcon=needThisMonth.urgence==='urgent'?'⚠ ':needThisMonth.urgence==='soon'?'↑ ':'';
            const ke=needThisMonth.key.replace(/'/g,"\'");
            const le=needThisMonth.label.replace(/'/g,"\'");
            const ce=(needThisMonth.sortantNom?'après '+needThisMonth.sortantNom:'').replace(/'/g,"\'");
            chips+=`<span class="chip ${nc}" style="cursor:pointer" onclick="openRec('${ke}','${le}','${ce}')" title="Prise de poste : ${fmt(needThisMonth.disponible)}">${urgIcon}Recruter</span>`;
            chips+=`<span style="font-size:9px;color:var(--sub);display:block;margin-top:1px">Poste dispo: ${fmtS(needThisMonth.disponible)}</span>`;
          }
        }

        h+=`<td class="c-mo" style="border:1px solid var(--border);background:${cellBg}"><div class="${cellClass}">${chips}</div></td>`;
      });
      h+=`</tr>`;
    }
  });

  h+=`</table></div>`;

  // Légende
  h+=`<div class="pl-leg">
    <span class="pl-li"><span class="pl-dot" style="background:var(--brand)"></span>Stage en cours</span>
    <span class="pl-li"><span class="pl-dot" style="background:#185FA5"></span>Alternance</span>
    <span class="pl-li"><span class="pl-dot" style="background:#EF9F27"></span>Délai de carence</span>
    <span class="pl-li"><span class="pl-dot" style="background:var(--e)"></span>Recruter — urgent</span>
    <span class="pl-li"><span class="pl-dot" style="background:#EF9F27"></span>Recruter — bientôt</span>
    <span class="pl-li"><span class="pl-dot" style="background:var(--brand)"></span>Recruter — planifié</span>
    <span class="pl-li"><span class="pl-dot" style="background:var(--s)"></span>Recrutement lancé</span>
    <span class="pl-li" style="color:var(--sub)">→ Début de stage &nbsp; ← Fin de stage</span>
  </div>`;

  // ── SYNTHÈSE ──
  if(needs.length){
    h+=`<div style="margin-top:28px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:12px">
      <div style="font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px">Récapitulatif des recrutements à venir</div>
      <div style="display:flex;flex-direction:column;gap:0">`;

    needs.forEach((n,i)=>{
      const r=recs[n.key];
      const urgColor=n.urgence==='urgent'?'var(--e)':n.urgence==='soon'?'var(--w)':'var(--brand)';
      const urgBg=n.urgence==='urgent'?'var(--e-bg)':n.urgence==='soon'?'var(--w-bg)':'var(--brand-bg)';
      const urgTxt=n.urgence==='urgent'?'Urgent':n.urgence==='soon'?'Bientôt':'Planifié';
      const recStatus=r?` <span style="font-size:11px;font-weight:500;background:var(--s-bg);color:var(--s);padding:1px 6px;border-radius:3px">⚡ ${ST_LBL[r.status]}${r.nom?' · '+r.nom:''}</span>`:'';
      const borderTop=i>0?'border-top:1px solid var(--border);':'';

      h+=`<div style="${borderTop}padding:12px 0;display:flex;align-items:flex-start;gap:14px">
        <span style="margin-top:2px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:${urgBg};color:${urgColor};white-space:nowrap;flex-shrink:0">${urgTxt}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${n.label}${n.sortantNom?` <span style="font-weight:400;color:var(--sub)">— successeur de ${n.sortantNom}</span>`:' <span style="font-weight:400;color:var(--e)">— poste non couvert</span>'}${recStatus}</div>
          <div style="display:flex;gap:20px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--sub)">Lancer le recrutement : <strong style="color:${n.dL<0?'var(--e)':n.dL<=30?'var(--w)':'var(--text)'}">${fmt(n.lancerLe)}${n.dL<0?' — dépassé':''}</strong></span>
            <span style="font-size:12px;color:var(--sub)">Prise de poste : <strong style="color:var(--text)">${fmt(n.disponible)}</strong></span>
          </div>
        </div>
      </div>`;
    });

    h+=`</div></div>`;
  }

  document.getElementById('p-planning').innerHTML=h;
}

/* ═══ RENDER ÉQUIPE ═══ */
function renderEquipe(){
  let h='';
  postes.forEach(p=>{
    const members=stags.filter(s=>s.pid===p.id);
    const actifs=members.filter(s=>{const st=getSt(s);return st==='actif'||st==='futur';}).length;
    const tb=p.type==='alternance'?`<span class="bdg" style="background:#E6F1FB;color:#0C447C">Alternance</span>`:`<span class="bdg" style="background:var(--brand-bg);color:#3C3489">Stage</span>`;
    h+=`<div class="tposte"><div class="tphd"><span style="font-size:13px;font-weight:500">${p.label}</span>${tb}<span class="tpcount">${actifs} / ${p.quota}</span><button class="btn sm" onclick="openAdd('${p.id}')" style="margin-left:8px">+ Ajouter</button></div><div class="tpgrid">`;
    members.forEach(s=>{
      const st=getSt(s);const al=getAl(s);const fc=getFC(s);const cM=getCarenceMois(s);
      const stMap={actif:'var(--s-bg);color:var(--s)',carence:'var(--w-bg);color:var(--w)',futur:'var(--i-bg);color:var(--i)',off:'var(--bg);color:var(--sub)',incomplet:'var(--bg);color:var(--sub)'};
      const stTxt={actif:'En poste',carence:'Carence',futur:'À venir',off:'Terminé',incomplet:'—'};
      const durJours=s.deb&&s.fin?diff(s.fin,s.fin<TODAY?s.fin:TODAY):null;
      let carH='';
      if(s.arch&&s.fcm){carH=`<div class="mrow"><span class="mlbl">Fin carence</span><span class="mval" style="color:var(--w)">${fmt(s.fcm)}</span></div>`;}
      else if(cM&&cM>0){
        carH=`<div class="mrow"><span class="mlbl">Carence</span><span class="mval" style="color:var(--w)">${cM} mois (fin ${fmt(fc)})</span></div>`;
        if(st==='carence'){
          const totalJ=fc&&s.fin?diff(s.fin,fc):cM*30;
          const elJ=Math.max(0,diff(s.fin,TODAY));
          const pct=Math.min(100,Math.round(elJ/totalJ*100));
          carH+=`<div class="mcbar"><div class="mcfill" style="width:${pct}%"></div></div><div class="mcinfo">${Math.round(elJ/30)} / ${cM} mois (${pct}%)</div>`;
        }
      } else if(s.nc){carH=`<div class="mrow"><span class="mlbl">Carence</span><span class="mval" style="color:var(--s)">Aucune</span></div>`;}
      let nextH='';if(fc&&(st==='actif'||st==='carence'||st==='futur')&&!s.nc){nextH=`<div class="mnext">Suivant dès le <strong>${fmt(fc)}</strong></div>`;}
      let alH='';if(al){alH=`<div class="malert ${al.t}">${al.msg}</div>`;}
      const dur=s.deb&&s.fin?`${moisEntiers(s.deb,s.fin)} mois`:(s.fin?'durée inconnue':'');
      h+=`<div class="mcard"><div class="mchd"><span style="font-size:14px;font-weight:500">${s.nom}</span><span class="bdg" style="background:${stMap[st]||'var(--bg);color:var(--sub)'}">${stTxt[st]||'—'}</span></div>
        ${s.deb?`<div class="mrow"><span class="mlbl">Période</span><span class="mval">${fmtS(s.deb)} → ${fmtS(s.fin)}</span></div>`:''}
        ${!s.deb&&s.fin?`<div class="mrow"><span class="mlbl">Fin</span><span class="mval">${fmt(s.fin)}</span></div>`:''}
        ${dur?`<div class="mrow"><span class="mlbl">Durée</span><span class="mval">${dur}</span></div>`:''}
        ${carH}${alH}${nextH}
        <div class="mact"><button class="btn sm" onclick="openEdit(${s.id})">Modifier</button><button class="btn sm danger" onclick="delS(${s.id})">Supprimer</button></div>
      </div>`;
    });
    const vides=Math.max(0,p.quota-members.length);
    for(let i=0;i<vides;i++)h+=`<div class="mvacant" onclick="openAdd('${p.id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Poste libre</div>`;
    h+=`</div></div>`;
  });
  document.getElementById('p-equipe').innerHTML=h;
}

/* ═══ RENDER PARAMÈTRES ═══ */
function renderParams(){
  let h=`<div style="max-width:580px">
  <div class="cfg" style="margin-bottom:20px">
    <div class="cfg-hd"><span class="cfg-name">Délai d'anticipation</span></div>
    <div class="cfg-quota-row"><span class="cfg-lbl">Jours avant la prise de poste</span>
      <div class="stepper"><button onclick="config.delai=Math.max(30,config.delai-30);renderAll()">−</button><span>${config.delai}</span><button onclick="config.delai+=30;renderAll()">+</button></div>
    </div>
    <div class="cfg-info">Recrutement à lancer ${Math.round(config.delai/30)} mois avant la prise de poste.</div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <span style="font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em">Types de postes</span>
    <button class="btn sm p" onclick="openAddPoste()">+ Ajouter un poste</button>
  </div>`;
  postes.forEach(p=>{
    const nb=stags.filter(s=>s.pid===p.id).length;
    const tb=p.type==='alternance'?`<span class="bdg" style="background:#E6F1FB;color:#0C447C">Alternance</span>`:`<span class="bdg" style="background:var(--brand-bg);color:#3C3489">Stage</span>`;
    h+=`<div class="cfg"><div class="cfg-hd"><div style="display:flex;align-items:center;gap:8px"><span class="cfg-name">${p.label}</span>${tb}</div><button class="btn sm danger" onclick="delPoste('${p.id}')">Supprimer</button></div>
      <div class="cfg-quota-row"><span class="cfg-lbl">Postes simultanés autorisés</span>
        <div class="stepper"><button onclick="changeQuota('${p.id}',-1)">−</button><span>${p.quota}</span><button onclick="changeQuota('${p.id}',1)">+</button></div>
      </div>
      <div class="cfg-info">${nb} stagiaire${nb>1?'s':''} enregistré${nb>1?'s':''} sur ce poste.</div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('p-params').innerHTML=h;
}

function renderPage(id){
  if(id==='besoins')renderBesoins();
  if(id==='planning')renderPlanning();
  if(id==='equipe')renderEquipe();
  if(id==='params')renderParams();
}
function renderAll(){
  const on=document.querySelector('.page.on')?.id?.replace('p-','');
  renderPage(on||'besoins');
}
renderAll();
</script>
